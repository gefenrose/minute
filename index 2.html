<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta name="theme-color" content="#558b2f">

<link rel="apple-touch-icon" href="./icons/icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="דקה ביום">
<meta charset="UTF-8">
<title>דקה ביום 🌿</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;}
body{margin:0;padding:0;background:#fefcf5;color:#3e2723;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;overflow-x:hidden;}
.container{width:100%;max-width:375px;padding:12px;display:flex;flex-direction:column;gap:12px;}
.card{background:#fff;border-radius:20px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);transition:opacity 0.4s, transform 0.4s;display:flex;flex-direction:column;gap:12px;}
.card.hidden{display:none;}
h1,h2{text-align:center;color:#33691e;margin:6px 0 12px;}
h1{font-size:clamp(20px,5vw,24px);}
h2{font-size:clamp(18px,4vw,22px);}
<style>
textarea{
  width:100%;
  min-height:80px;
  padding:12px;
  border-radius:14px;
  border:1px solid #c7b8a6;
  background:#fcf9f0;
  font-size:clamp(14px,2.5vw,16px);
}

<div class="mood-section">
  <div class="mood-title">איך הרגשת היום?</div>

  <input
    id="moodSlider"
    type="range"
    min="0"
    max="6"
    value="3"
    style="width:100%;accent-color:#558b2f;"
  >

  <div
    id="moodValue"
    style="text-align:center;font-size:18px;color:#33691e;margin-top:10px;"
  >
    😐 ניטרלי
  </div>
</div>
.link{text-align:center;margin-top:10px;color:#558b2f;cursor:pointer;font-size:clamp(12px,2.5vw,14px);}
.search{width:100%;padding:8px;border-radius:14px;border:1px solid #c7b8a6;margin-bottom:10px;font-size:clamp(12px,2.5vw,14px);}
.month{margin-bottom:12px;border-radius:14px;background:#f7f5ee;overflow:hidden;}
.month-header{padding:8px;font-weight:600;cursor:pointer;font-size:clamp(12px,2.5vw,14px);}
.entry{padding:8px;border-top:1px solid #e0d7cc;word-break:break-word;}
.entry-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.entry-date{font-size:clamp(10px,2vw,12px);color:#8d6e63;}
.entry-mood{font-size:clamp(10px,2vw,12px);}
.actions{display:flex;gap:6px;font-size:clamp(12px,2vw,14px);color:#558b2f;flex-wrap:wrap;}
.chart{display:flex;justify-content:space-between;flex-wrap:wrap;margin-top:10px;gap:4px;}
.bar{flex:1 1 auto;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2vw,12px);color:#fff;transition: all 0.5s ease;}
.bar.😊{background:#81c784;} .bar.😌{background:#aed581;} .bar.😔{background:#4db6ac;}
.bar.😡{background:#e57373;} .bar.😎{background:#64b5f6;} .bar.🥰{background:#f06292;}
.bar.😴{background:#90a4ae;} .bar.😕{background:#ffd54f;} .bar.🌿{background:#a5d6a7;} .bar.✨{background:#ffb74d;}
#lineChart{width:100%;height:100px;margin-top:10px;display:block;}
.line{stroke:#558b2f;stroke-width:3;fill:none;transition: stroke-dashoffset 0.6s ease;}
.dot{fill:#33691e;transition:r 0.3s ease;}
.back-btn{margin-top:auto;text-align:center;color:#558b2f;cursor:pointer;font-size:clamp(12px,2.5vw,14px);}
@media (max-width:390px){.container{max-width:390px;}} /* iPhone 13 */
@media (max-width:360px){.container{max-width:360px;}} /* Samsung Galaxy S23 */
</style>
</head>
<body>
<div class="container">
<div id="journal" class="card">
<h1>דקה ביום 🌿</h1>
<textarea id="entry" placeholder="משפט אחד על היום…"></textarea>
<div class="mood-section">
<div class="mood-title">איך הרגשת היום?</div>
<div id="moodGrid" class="mood-grid"></div>
</div>
<button onclick="save()">שמור</button>
<div class="link" onclick="openHistory()">📖 היסטוריה</div>
<div class="link" onclick="openStats()">📊 סטטיסטיקה חודשית</div>
</div>
<div id="history" class="card hidden">
<h2>היסטוריה 🌿</h2>
<input id="search" class="search" placeholder="חיפוש…" oninput="renderHistory()">
<div id="list"></div>
<div class="back-btn" onclick="back()">⬅ חזור ליום</div>
</div>
<div id="stats" class="card hidden">
<h2>סטטיסטיקת רגשות 🌿</h2>
<select id="monthSelect" onchange="renderStats()"></select>
<div id="chart" class="chart"></div>
<svg id="lineChart" viewBox="0 0 100 30" preserveAspectRatio="none"></svg>
<button onclick="exportPDF()">📝 ייצוא PDF</button>
<div class="back-btn" onclick="back()">⬅ חזור ליום</div>
</div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').then(()=>console.log('Service Worker registered')).catch(e=>console.error(e));}
const PREFIX = "minute-";

const MOOD_LABELS = [
  "😄 מאניה",
  "✨ מרומם",
  "🙂 טוב",
  "😐 ניטרלי",
  "😔 ירוד",
  "🌧 עצוב",
  "💙 דיכאון"
];
let selectedMood = MOOD_LABELS[3];
let editingDate = null;
const grid=document.getElementById("moodGrid"), journal=document.getElementById("journal"), history=document.getElementById("history"), stats=document.getElementById("stats"), list=document.getElementById("list"), search=document.getElementById("search");
const slider = document.getElementById("moodSlider");
const moodValue = document.getElementById("moodValue");

slider.addEventListener("input", () => {
  selectedMood = MOOD_LABELS[slider.value];
  moodValue.textContent = selectedMood;
});
function save(){const date=editingDate||new Date().toISOString().slice(0,10);localStorage.setItem(PREFIX+date,JSON.stringify({text:entry.value.trim(),mood:selectedMood}));editingDate=null;entry.value="";selectedMood="";document.querySelectorAll(".mood-btn").forEach(x=>x.classList.remove("active"));alert("נשמר 🌿");}
function openHistory(){renderHistory();toggle("history");}
function openStats(){populateMonths();renderStats();toggle("stats");}
function back(){toggle("journal");}
function toggle(id){journal.classList.add("hidden");history.classList.add("hidden");stats.classList.add("hidden");document.getElementById(id).classList.remove("hidden");}
function renderHistory(){const q=search.value.toLowerCase();list.innerHTML="";const byMonth={};Object.keys(localStorage).filter(k=>k.startsWith(PREFIX)).forEach(k=>{const date=k.replace(PREFIX,"");const month=date.slice(0,7);byMonth[month]=byMonth[month]||[];byMonth[month].push({date,...JSON.parse(localStorage[k])});});
if(Object.keys(byMonth).length===0){list.innerHTML="<div style='text-align:center;color:#8d6e63;'>אין היסטוריה עדיין 🌿</div>";return;}
Object.keys(byMonth).sort().reverse().forEach(month=>{const m=document.createElement("div");m.className="month";const h=document.createElement("div");h.className="month-header";h.textContent=month;const c=document.createElement("div");h.onclick=()=>c.classList.toggle("hidden");byMonth[month].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{if(q&&!e.text.toLowerCase().includes(q)&&!e.mood.includes(q))return;const d=document.createElement("div");d.className="entry";d.innerHTML=`<div class="entry-header"><div><div class="entry-date">${e.date}</div><div class="entry-mood">${e.mood||""}</div></div><div class="actions"><span onclick="editEntry('${e.date}')">✏️</span></div></div><div>${e.text}</div>`;c.appendChild(d);});if(c.children.length){m.append(h,c);list.appendChild(m);}});
if(!list.innerHTML)list.innerHTML="<div style='text-align:center;color:#8d6e63;'>אין תוצאות</div>";}
function editEntry(date){const d=JSON.parse(localStorage.getItem(PREFIX+date));editingDate=date;entry.value=d.text;selectedMood=d.mood;document.querySelectorAll(".mood-btn").forEach(b=>b.classList.toggle("active",b.textContent===selectedMood));toggle("journal");}
function populateMonths(){const sel=document.getElementById("monthSelect");sel.innerHTML="";const months=new Set(Object.keys(localStorage).filter(k=>k.startsWith(PREFIX)).map(k=>k.replace(PREFIX,"").slice(0,7)));Array.from(months).sort().forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;sel.appendChild(o);});}
function renderStats(){const month=document.getElementById("monthSelect").value;const chart=document.getElementById("chart");chart.innerHTML="";const counts={};MOODS.forEach(m=>counts[m]=0);Object.keys(localStorage).filter(k=>k.startsWith(PREFIX)&&k.includes(month)).forEach(k=>{const d=JSON.parse(localStorage[k]);if(d.mood&&counts[d.mood]!==undefined)counts[d.mood]++;});const max=Math.max(...Object.values(counts),1);MOODS.forEach(m=>{const b=document.createElement("div");b.className="bar "+m;b.style.flex="0";b.textContent=counts[m]>0?m:"";chart.appendChild(b);setTimeout(()=>b.style.flex=counts[m]/max,50);});renderWeeklyChart();}
function renderWeeklyChart(){const svg=document.getElementById("lineChart");svg.innerHTML="";const days=7,values=[];for(let i=0;i<days;i++){const date=new Date();date.setDate(date.getDate()-i);const key=PREFIX+date.toISOString().slice(0,10);const e=localStorage.getItem(key);values.unshift(e?MOODS.indexOf(JSON.parse(e).mood)+1||0:0);}const w=100,h=30,maxVal=Math.max(...values,1);let path="";values.forEach((v,i)=>{const x=i*(w/(days-1));const y=h-(v/maxVal)*h;path+=i===0?`M${x},${y}`:` L${x},${y}`;});const line=document.createElementNS("http://www.w3.org/2000/svg","path");line.setAttribute("d",path);line.setAttribute("class","line");line.setAttribute("stroke-dasharray",line.getTotalLength());line.setAttribute("stroke-dashoffset",line.getTotalLength());svg.appendChild(line);setTimeout(()=>line.setAttribute("stroke-dashoffset",0),50);values.forEach((v,i)=>{const x=i*(w/(days-1)),y=h-(v/maxVal)*h;const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");dot.setAttribute("cx",x);dot.setAttribute("cy",y);dot.setAttribute("r",v?1.5:0);dot.setAttribute("class","dot");svg.appendChild(dot);});}
function exportPDF(){const month=document.getElementById("monthSelect").value;const { jsPDF } = window.jspdf;const doc=new jsPDF();doc.setFontSize(16);doc.text(`סטטיסטיקת רגשות - ${month}`,14,20);const yStart=30,chartData=document.getElementById("chart").children;let x=14;Array.from(chartData).forEach(b=>{const w=15,h=50*(b.style.flex||0);const bg=window.getComputedStyle(b).backgroundColor;doc.setFillColor(bg);doc.rect(x,yStart,w,h,'F');doc.setTextColor(0,0,0);doc.text(b.textContent||'',x+4,yStart+h+4);x+=w+3;});doc.save(`סטטיסטיקה_${month}.pdf`);}
</script>
</body>
</html>
